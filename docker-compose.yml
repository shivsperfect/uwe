services:
  database:
    image: postgres:18-alpine
    container_name: uwe-project
    restart: unless-stopped
    environment:
      POSTGRES_DB: 'postgres'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
    ports:
      - "5432:5432"
    volumes:
      - ./database/postgres-data:/var/lib/postgresql/data:rw

volumes:
  postgres-data: